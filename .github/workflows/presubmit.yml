name: Presubmit

on:
    push:
        branches: ["**"]
    workflow_dispatch:

jobs:
    findings_header:
        name: Findings Header
        runs-on: ubuntu-latest
        steps:
            - name: Upload Findings
              run: |
                  printf "# Findings\n\nThis presubmit run has produced the following findings!\n\n" >> $GITHUB_STEP_SUMMARY

    presubmit:
        name: ${{ matrix.name }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: Tools
                      os: ubuntu-latest
                      checkset: generic-tools
                    - name: Linux [x86_64] (x86_64-gcc) (Build and Test)
                      os: ubuntu-latest
                      checkset: x86_64-linux-gcc-debug
                    - name: Linux [x86_64] (x86_64-gcc) (Build and Package)
                      os: ubuntu-latest
                      checkset: x86_64-linux-gcc-relwithdebinfo
                    - name: Linux [x86_64] (x86_64-clang) (Build and Test)
                      os: ubuntu-latest
                      checkset: x86_64-linux-clang-debug
                    - name: Linux [x86_64] (x86_64-clang) (Build and Package)
                      os: ubuntu-latest
                      checkset: x86_64-linux-clang-relwithdebinfo
                    - name: Linux [x86_64] (i686-gcc) (Build and Test)
                      os: ubuntu-latest
                      checkset: i686-linux-gcc-debug
                    - name: Linux [x86_64] (i686-gcc) (Build and Package)
                      os: ubuntu-latest
                      checkset: i686-linux-gcc-relwithdebinfo
                    - name: Linux [x86_64] (i686-clang) (Build and Test)
                      os: ubuntu-latest
                      checkset: i686-linux-clang-debug
                    - name: Linux [x86_64] (i686-clang) (Build and Package)
                      os: ubuntu-latest
                      checkset: i686-linux-clang-relwithdebinfo
                    - name: msys2 [x86_64] (x86_64-clang) (Build and Test)
                      os: windows-latest
                      checkset: x86_64-msysclang64-clang-debug
                      msystem: CLANG64
                      packages: base-devel mingw-w64-clang-x86_64-python
                    - name: msys2 [x86_64] (x86_64-clang) (Build and Package)
                      os: windows-latest
                      checkset: x86_64-msysclang64-clang-relwithdebinfo
                      msystem: CLANG64
                      packages: base-devel mingw-w64-clang-x86_64-python
                    - name: msys2 [x86_64] (x86_64-gcc) (Build and Test)
                      os: windows-latest
                      checkset: x86_64-msys64-gcc-debug
                      msystem: MINGW64
                      packages: base-devel mingw-w64-x86_64-python
                    - name: msys2 [x86_64] (x86_64-gcc) (Build and Package)
                      os: windows-latest
                      checkset: x86_64-msys64-gcc-relwithdebinfo
                      msystem: MINGW64
                      packages: base-devel mingw-w64-x86_64-python
                    - name: Win32 [x86_64] (x86_64-msvc) (Build and Test)
                      os: windows-latest
                      checkset: x86_64-win32-msvc-debug
                    - name: Win32 [x86_64] (x86_64-msvc) (Build and Package)
                      os: windows-latest
                      checkset: x86_64-win32-msvc-relwithdebinfo
                    - name: Win32 [x86_64] (i686-msvc) (Build and Test)
                      os: windows-latest
                      checkset: i686-win32-msvc-debug
                    - name: Win32 [x86_64] (i686-msvc) (Build and Package)
                      os: windows-latest
                      checkset: i686-win32-msvc-relwithdebinfo
        defaults:
            run:
                shell: ${{ matrix.msystem && 'msys2 {0}' || 'bash' }}
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Cache Build Directory
              uses: actions/cache@v4
              with:
                  path: ${{ matrix.checkset }}-build
                  key: build-${{ matrix.checkset }}
                  restore-keys: build-${{ matrix.checkset }}

            - name: Setup MSYS2
              if: matrix.msystem
              uses: msys2/setup-msys2@v2
              with:
                  msystem: ${{ matrix.msystem }}
                  update: true
                  install: ${{ matrix.packages }}

            - name: Setup Python
              if: ${{ !matrix.msystem }}
              uses: actions/setup-python@v5
              with:
                  python-version: "3.x"

            - name: Run Checkset
              env:
                  PYTHONUNBUFFERED: "1"
                  CPLUS_INCLUDE_PATH: /usr/include/c++/14:/usr/include/x86_64-linux-gnu/c++/14
              run: python3 workflows/all_push.py -d=. -cs=${{ matrix.checkset }} -v

            - name: Upload Findings
              if: always()
              run: python3 workflows/all_findings.py -d=. -s -v >> $GITHUB_STEP_SUMMARY

            - name: Upload Coverage Report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-${{ matrix.checkset }}
                  path: "*-build/coverage/"
                  if-no-files-found: ignore

            - name: Upload Documentation
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: docs-build
                  path: "docs-build/"
                  if-no-files-found: ignore

            - name: Upload Build Artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: artifacts-${{ matrix.checkset }}
                  path: artifacts-build/**
                  if-no-files-found: ignore

    release:
        name: Canary Release
        needs: presubmit
        if: (success())
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Download Artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts
                  pattern: "artifacts-*"
                  merge-multiple: true

            - name: Create and Push Canary Tag
              id: tag
              shell: python
              run: |
                  import os
                  import subprocess
                  from datetime import datetime, timezone

                  tag_name = f"canary-{datetime.now(timezone.utc).strftime('%Y%m%d')}[{os.environ['GITHUB_RUN_ID']}]"

                  try:
                      subprocess.run(["git", "tag", tag_name], check=True)
                      subprocess.run(["git", "push", "origin", tag_name], check=True)
                      print(f"Successfully pushed tag: `{tag_name}`.")
                  except subprocess.CalledProcessError as e:
                      print(e)
                      exit(1)

                  with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                      f.write(f"name={tag_name}\n")

            - name: Post Canary Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.tag.outputs.name }}
                  name: "Canary 🪶"
                  body: "Latest canary release courtesy of automatic build and package."
                  prerelease: true
                  files: artifacts/**
                  fail_on_unmatched_files: false
                  generate_release_notes: true
